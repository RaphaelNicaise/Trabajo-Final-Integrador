name: CI/CD - StoreHub

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Crear archivo .env de prueba
        run: |
          echo "INTERNAL_API_KEY=${{ secrets.INTERNAL_API_KEY }}" >> .env
          echo "SMTP_HOST=smtp.gmail.com" >> .env
          echo "SMTP_PORT=465" >> .env
          echo "MAIL_USER=${{ secrets.MAIL_USER }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
          

      - name: Levantar infraestructura de tests
        run: docker compose -f infra/test.yml --env-file .env up -d --build

      - name: Esperar resultados
        run: |
          API_EXIT_CODE=$(docker wait api-tests)
          docker logs api-tests
          if [ "$API_EXIT_CODE" != "0" ]; then exit 1; fi

      - name: Limpiar contenedores
        if: always()
        run: docker compose -f infra/test.yml down -v

  frontend-tests-lint:
    name: Frontend Tests & Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: cd frontend && pnpm install

      - name: Ejecutar tests unitarios
        run: cd frontend && pnpm test -- --testPathPattern="__tests__/unit" --ci --runInBand
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Ejecutar linter
        run: cd frontend && pnpm lint

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests-lint]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH y Deploy en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            
            cd /home/ubuntu/storehub
            
            git pull origin main
            
            docker compose -f infra/prod.yml --env-file .env up -d --build
            
            docker image prune -f